[providers]
python = "3.11"

[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2t64",
  "libpango-1.0-0",
  "libcairo2",
  "libatspi2.0-0",
  "libx11-6",
  "libxcb1",
  "libxshmfence1",
  "libgtk-3-0"
]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel"
]

[phases.install]
cmds = [
  "cd backend && pip3 install --break-system-packages -r requirements.txt",
  "cd backend && python3 -m playwright install --with-deps chromium"
]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
