[providers]
python = "3.11"

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel",
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "mesa",
  "alsa-lib",
  "pango",
  "cairo",
  "gtk3",
  "libxkbcommon",
  "xorg.libxshmfence",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb"
]

[phases.install]
cmds = [
  "cd backend && pip3 install --break-system-packages -r requirements.txt",
  "cd backend && python3 -m playwright install chromium"
]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
